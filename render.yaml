services:
  - type: web
    name: crush-ray-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NODE_ENV
        value: production
    plan: free
    healthCheckPath: /
    autoDeploy: true
    domains:
      - crush-ray-bot.onrender.com